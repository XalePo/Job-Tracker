<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Application Detail</title>
    </head>
    <body>
        <h1>Application Detail</h1>

        <p><strong>Company:</strong> {{ application.company_name }}</p>
        <p><strong>Position:</strong> {{ application.position_title }}</p>
        <p><strong>Status:</strong> {{ application.status }}</p>
        <p><strong>Date Applied</strong> {{ application.date_applied }}</p>
        <p><strong>Notes:</strong> {{ application.notes }}</p>

        <a href="/applications/">Back to applications</a>
    </body>
</html>
