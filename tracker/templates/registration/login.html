{% load static %}

<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Log in</title>
        <link rel="stylesheet" href="{% static 'tracker/styles.css' %}">
    </head>
    <body>
        <div class="login-wrapper">

            <h1>Log in</h1>

            <div class="login-card">
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit">Login</button>
                </form>
            </div>

        </div>
    </body>
</html>
